<div class="nav-bar">

  <!-- ── Scrollable strip ── -->
  <div
    class="nav-track"
    #navTrack
    (mousedown)="onMouseDown($event)"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMoveLocal($event)"
    (touchend)="onTouchEndLocal()"
  >
    <div class="nav-strip" #navStrip>

      <!-- Afficher seulement si pas en chargement -->
      <ng-container *ngIf="!isLoading">
  <ng-container *ngFor="let item of navItems">
    
    <div
      *ngIf="item.visible !== false"
      class="nav-item"
      [class.captured]="isCapture(item)"
      [class.near]="isNear(item)"
      [attr.data-idx]="item.idx"
    >
      <div class="item-inner" (click)="onNavItemClick(item)">
        <div class="badge-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fbfcfc"
               stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
               [innerHTML]="item.iconPath | safeHtml">
          </svg>
          <span class="star" *ngIf="item.star">{{ item.emoji }}</span>
          <span class="badge" *ngIf="item.badge">{{ item.badge }}</span>
        </div>
        <span class="item-label">{{ item.label }}</span>
      </div>
    </div>

  </ng-container>
</ng-container>

    </div>
  </div>

  <!-- ── Fixed circle portal ── -->
  <div class="circle-portal" #circlePortal>


    <!-- Action button (immuable) — always shows active icon, navigates to action page -->
    <button class="circle-action-btn">
      <svg viewBox="0 0 24 24" fill="none"
           stroke="#1a1a1a" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round"
           [innerHTML]="activeItem.iconPath | safeHtml">
      </svg>
    </button>

    <!-- Chord separator line -->
    <div class="chord-line"></div>

    <!-- Chord label (beige translucide) -->
    <div class="circle-chord">
      <span>{{ activeItem.label }}</span>
    </div>

    <!-- Orange ring (drawn last, on top) -->
    <svg class="circle-ring" viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main ring only -->
      <circle cx="46" cy="46" r="43" stroke="#FF6B00" stroke-width="2.5"/>
    </svg>

  </div>

</div>
