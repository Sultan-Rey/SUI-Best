<div class="modal-container">
  <header class="modal-header">
    <div class="drag-handle"></div>
    <div class="header-content">
      <h1>Boutique de Coins</h1>
      <button class="btn-close" (click)="dismiss()">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>
  </header>

  <ion-content scroll-y="false">
    <div class="state-container" *ngIf="isLoading || showEmptyState">
      <div class="spinner" *ngIf="isLoading"></div>
      <div class="empty-view" *ngIf="showEmptyState">
        <ion-icon name="sparkles-outline"></ion-icon>
        <p>Bientôt disponible...</p>
      </div>
    </div>

    <div class="shop-wrapper" *ngIf="hasPacks && !isLoading">
      
      <div class="slider-section">
        <button class="nav-arrow left" (click)="prevSlide()" [class.hidden]="currentSlideIndex === 0">
          <ion-icon name="chevron-back-outline"></ion-icon>
        </button>

        <div class="viewport">
          <div class="slides-track" [style.transform]="'translateX(-' + (currentSlideIndex * 100) + '%)'">
            <div *ngFor="let slide of slidesData" class="slide-page">
              <div class="pack-grid">
                <div *ngFor="let pack of slide.packs" 
                     class="pack-card" 
                     [class.featured]="pack.isBestValue"
                     (click)="purchasePack(pack)">
                  
                  <div class="badge" *ngIf="pack.isBestValue">TOP</div>
                  
                  <div class="visual">
                    <img [src]="(pack.icon | mediaUrl | async)" alt="coins">
                  </div>

                  <div class="info">
                    <span class="qty">{{ pack.amount }}</span>
                    <span class="unit">Coins</span>
                  </div>

                  <div class="price-tag">${{ pack.price }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button class="nav-arrow right" (click)="nextSlide()" [class.hidden]="currentSlideIndex === slidesData.length - 1">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </div>

      <footer class="slider-footer">
        <div class="pagination">
          <span *ngFor="let s of slidesData; let i = index" 
                class="dot" [class.active]="i === currentSlideIndex"></span>
        </div>
      </footer>
    </div>
  </ion-content>
</div>
