<ion-content [fullscreen]="true" class="fanlabel-content">

  <div class="overlay"></div>

  <div class="album-scroll-wrapper">
    <div class="album-track">
      <div class="album-card" *ngFor="let cover of albumCovers" [style.background-image]="'url(' + cover.url + ')'"></div>
      <div class="album-card" *ngFor="let cover of albumCovers" [style.background-image]="'url(' + cover.url + ')'"></div>
    </div>
  </div>

  <div class="main-wrapper">

    <div class="top-content">
      <div class="header">
        <div class="logo logo-icon">
          <img src="assets/logo/logo-transparent.png" />
        </div>
      </div>

      <div class="hero-section" *ngIf="!showLoginForm">
        <div class="top-album-row">
          <div class="album-thumb featured" *ngFor="let cover of topRowCovers" [style.background-image]="'url(' + cover + ')'"></div>
        </div>

        <div class="tagline">
          <h1>tu penses avoir du <br>talent?</h1>
        </div>
      </div>
    </div>

    <div class="prove-section">
      <div *ngIf="!showLoginForm">
        <h2 class="prove-text">prouve le.</h2>
        <p class="platinum-text">
          <strong>Nous offrons le podium, brille comme une star</strong><br>
        </p>
      </div>

      <div *ngIf="showLoginForm" class="login-form-container">
        <h2 class="login-title">connexion.</h2>
        
        <div class="input-group">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input type="email" placeholder="Email" [(ngModel)]="email" class="custom-input"></ion-input>
        </div>

        <div class="input-group">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Mot de passe" [(ngModel)]="password" class="custom-input"></ion-input>
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="toggle-password" (click)="togglePasswordVisibility()"></ion-icon>
        </div>

        <p class="forgot-password" (click)="navigateToForgotPassword()">Mot de passe oublié ?</p>
      </div>
    </div>

  </div>

  <div class="auth-panel">
    <ng-container *ngIf="!showLoginForm">
      <button class="btn-auth btn-login" (click)="onLogin()">log in</button>
      <button class="btn-auth btn-signup" (click)="onSignup()">sign up</button>
    </ng-container>

    <ng-container *ngIf="showLoginForm">
      <button class="btn-auth btn-submit" (click)="loginWithEmail()">Se connecter</button>
      <button class="btn-auth btn-back" (click)="showLoginForm = false">Retour</button>
    </ng-container>
  </div>

</ion-content>
