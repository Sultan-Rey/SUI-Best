<ion-content class="reset-content">
  <div class="reset-container">
    
    <div *ngIf="resetSuccess" class="success-state">
      <h2 class="success-title">Terminé.</h2>
      <p class="success-message">Votre accès est maintenant sécurisé.</p>
    </div>

    <div *ngIf="!resetSuccess" class="reset-form">
      <header class="form-header">
        <h1 class="form-title">Réinitialisation</h1>
        <p class="form-subtitle">Saisissez votre nouveau mot de passe.</p>
      </header>

      <div class="input-group">
        <div class="field-label">Nouveau mot de passe</div>
        <ion-item class="premium-input" lines="none">
          <ion-input 
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            (ionInput)="onPasswordChange()"
            placeholder="••••••••">
          </ion-input>
          <ion-icon 
            slot="end" 
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            (click)="togglePasswordVisibility()">
          </ion-icon>
        </ion-item>

        <div class="field-label">Confirmation</div>
        <ion-item class="premium-input" lines="none">
          <ion-input 
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            placeholder="••••••••">
          </ion-input>
        </ion-item>
      </div>

      <div *ngIf="newPassword" class="strength-container">
        <div class="strength-bar-bg">
          <div class="strength-fill" [style.width.%]="passwordStrength.score * 20"></div>
        </div>
      </div>

      <ion-button 
        expand="block" 
        (click)="resetPassword()"
        [disabled]="isLoading || !newPassword || newPassword !== confirmPassword"
        class="premium-button">
        <span *ngIf="!isLoading">Mettre à jour</span>
        <ion-spinner *ngIf="isLoading" name="dots"></ion-spinner>
      </ion-button>
    </div>
  </div>
</ion-content>
