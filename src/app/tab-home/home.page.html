<!-- Header natif HTML - pas de balises Ionic --
... (inchangé) -->

<app-header-component 
  [goBackTarget]="goBackTarget" 
  (goBack)="onGoBack($event)"
  [UserCanPublish] = "currentUserProfile.type!=='fan'"
  [UserIsVerified]="currentUserProfile.allowed_exclusive || false"
  [countUnreadMessages]="countUnreadMessages"
  [activeSegmentIndex]="getActiveSegmentIndex()"
  (navigationChange)="onNavigationChange($event)">
</app-header-component>

<!-- Contenu Ionic simplifié -->
<ion-content [fullscreen]="false" class="home-content" #contentRef>
  <div class="content-spacer"></div>
  
  <!-- Section Bannières Publicitaires Superposée -->
  <div class="floating-banner-ad" *ngIf="showBannerAd && hasContent && bannerAds.length > 0">
    <app-banner-ads 
      [bannerAds]="bannerAds" 
      [isLoading]="isLoadingBannerAds" 
      [hasError]="hasBannerAdsError">
    </app-banner-ads>
    <button class="close-banner-btn" (click)="closeBannerAd()">
      <ion-icon name="close"></ion-icon>
    </button>
  </div>
  
  <div class="views-container" [ngSwitch]="selectedSegment">
    <!-- Affiche les vues même offline - les composants géreront le cache -->
    
    <div class="view-panel challenge-panel" *ngSwitchCase="'challenge'">
      <app-challenge (navigateToTab)="onNavigate($event)"  [CurrentUserProfile]="currentUserProfile"></app-challenge>
    </div>

    <div class="view-panel discovery-panel" *ngSwitchCase="'discovery'">
      <app-discovery-view 
        [currentUserProfile]="currentUserProfile"
        (navigateToTab)="onNavigate($event)">
      </app-discovery-view>
    </div>

    <div class="view-panel followed-panel" *ngSwitchCase="'followed'">
      <app-followed-view 
        [currentUserProfile]="currentUserProfile"
        [posts]="args">
      </app-followed-view>
    </div>

    <div class="view-panel message-panel" *ngSwitchCase="'message'">
      <app-messages [currentUserId]="currentUserProfile.id || ''" [currentUsername]="currentUserProfile.displayName || ''"></app-messages>
    </div>

    <div class="view-panel upload-panel" *ngSwitchCase="'upload'">
      <app-publication [challenges]="args" [isChallenging]="navigationExtra" [CurrentUserProfile]="currentUserProfile"></app-publication>
    </div>

  </div>

  <!-- Empty state uniquement si pas de connexion ET pas de données cached -->
  <div class="empty-state-container" *ngIf="!isOnline">
    <div class="empty-state-content">
      <img src="assets/icon/no-internet.gif" alt="no-internet" class="empty-state-gif">
      <h2 class="empty-state-title"><ion-icon name="cloud-offline" slot="start"></ion-icon> Hors ligne !</h2>
      <p class="empty-state-text">
        Votre connexion a dérapé !<br>
        <strong>Reconnectez-vous</strong> pour retrouver les contenus<br>
        qui vont vous faire flipper !<br>
        <small>Les données cached sont disponibles...</small>
      </p>
      <ion-button 
        expand="block" 
        fill="solid" 
        color="gif" 
        class="empty-state-button"
        (click)="retryConnection($event)">
        <ion-icon name="refresh" slot="start"></ion-icon>
        Réessayer
      </ion-button>
    </div>
  </div>

</ion-content>

<!-- Floating Avatar Button -->
<div class="floating-avatar-btn"  (click)="goToProfile()" *ngIf="currentUserProfile.id && (isMobile && !isMobileWeb)">
  <!-- Affiche même offline pour accès au profil cached -->
  <img 
  [src]="currentUserProfile.avatar | mediaUrl | async" 
  [alt]="currentUserProfile.displayName || 'Profile'"
  class="avatar-img"
  (load)="onAvatarLoad($event)"
  (error)="onAvatarError($event)"
/>
  <div class="avatar-ring"></div>
  <div class="avatar-dot"></div>
</div>

<ion-footer *ngIf="isMobile && !isMobileWeb">
  <app-bottom-navigation
    (activeItemChange)="onNavigationChange($event)"
    [theme]="'dark'"
    [canPublish] = "currentUserProfile.type!=='fan'"
    [allowedToExclusive] = "currentUserProfile.allowed_exclusive"
    [unreadCount]="countUnreadMessages">
  </app-bottom-navigation>
</ion-footer>
