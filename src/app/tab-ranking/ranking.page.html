<app-header-component ></app-header-component>
<ion-content [fullscreen]="false" color="dark">
  <!-- Refresher pour pull-to-refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingIcon="circular" pullingText="Tirer pour rafraîchir" refreshingSpinner="circles" refreshingText="Chargement...">
    </ion-refresher-content>
  </ion-refresher>

  <div class="ranking-container">
    <!-- Header Section -->
    <div class="header-section">
      <h1 class="main-title">Classement des Artistes</h1>
      <p class="subtitle">Découvrez les talents qui font vibrer notre communauté</p>
      
      <!-- Tab Buttons -->
      <!-- <div class="tab-buttons">
        <ion-button 
          [fill]="selectedTab === 'votes' ? 'solid' : 'outline'" 
          [color]="selectedTab === 'votes' ? 'warning' : 'medium'"
          (click)="selectTab('votes')"
          class="tab-button">
          <ion-icon name="trophy" slot="start"></ion-icon>
          Top Votes
        </ion-button>
         <ion-button 
          [fill]="selectedTab === 'dons' ? 'solid' : 'outline'" 
          [color]="selectedTab === 'dons' ? 'warning' : 'medium'"
          (click)="selectTab('dons')"
          class="tab-button">
          <ion-icon name="cash" slot="start"></ion-icon>
          Top Dons
        </ion-button>
      </div> -->
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
      <ion-spinner name="crescent" color="warning"></ion-spinner>
      <p>Chargement des classements...</p>
    </div>

    <!-- ============================================ -->
    <!-- SECTION VOTES (affichée uniquement si votes) -->
    <!-- ============================================ -->
    <ng-container *ngIf="!isLoading && selectedTab === 'votes'">
      <!-- Empty State - Pas de défis -->
      <div *ngIf="!challengeRankings || challengeRankings.length === 0" class="empty-state">
        <div class="empty-icon">🏆</div>
        <h3 class="empty-title">Aucun classement disponible</h3>
        <p class="empty-description">
          Suivez des créateurs pour voir leurs défis dans le classement.
        </p>
        <ion-button fill="clear" class="empty-action" (click)="openSearch()">
          <ion-icon name="search" slot="start"></ion-icon>
          Explorer les créateurs
        </ion-button>
      </div>

      <!-- Contenu normal quand il y a des défis -->
      <app-votes-ranking 
        *ngIf="challengeRankings && challengeRankings.length > 0"
        [isLoading]="isLoading"
        [challengeRankings]="challengeRankings"
        [topArtists]="topArtists"
        (viewChallenge)="onViewChallenge($event)">
      </app-votes-ranking>
    </ng-container>

  
  </div>
  
</ion-content>
